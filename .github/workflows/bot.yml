name: Innovation Hub Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        
    - name: Install Packages
      run: npm install
      
    - name: Start AI Bot Directly
      run: node index.js
      
